plugins {
    id 'java'
}

group = 'com.mite'
version = '0.9.0'

repositories {
    mavenCentral()
}

dependencies {
    // Add dependencies as needed
}

jar {
    manifest {
        attributes 'Main-Class': 'com.mite.breakingeverything.server.Startup'
    }
    // Exclude stub classes from the final jar since they're replaced at runtime
    exclude 'net/minecraft/**'
}